<section id="skills">
  <div class="section-head" [@headerReveal]="sectionState()">
    <div>
      <h2>Skills</h2>
      <p>Core competencies and tools I use to build production Angular applications.</p>
    </div>
  </div>

  <div class="grid-3 skills-grid" [@cardsReveal]="sectionState()">
    <div class="skill-card tile" *ngFor="let cat of categories; let ci = index">
      <div class="skill-card-header">
        <span class="skill-icon" aria-hidden="true">{{ cat.icon }}</span>
        <div>
          <h3>{{ cat.title }}</h3>
          <p>{{ cat.desc }}</p>
        </div>
      </div>

      <div class="skill-bars">
        <div class="skill-bar-item" *ngFor="let skill of cat.skills; let si = index">
          <div class="skill-bar-meta">
            <span class="skill-name">{{ skill.name }}</span>
            <span class="skill-pct">{{ skill.level }}%</span>
          </div>
          <div class="skill-bar-track">
            <div
              class="skill-bar-fill"
              [class.visible]="barsVisible()"
              [style.background]="'linear-gradient(90deg, ' + skill.color + 'cc, ' + skill.color + '66)'"
              [style.--target-width]="skill.level + '%'"
              [style.transition-delay]="(ci * 0.15 + si * 0.08) + 's'"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
