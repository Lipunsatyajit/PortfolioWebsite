<section id="projects">
  <div class="section-head" [@headerReveal]="sectionState()">
    <div>
      <h2>Projects</h2>
      <p>Real-world Angular applications built for enterprise, SaaS, and e-commerce products.</p>
    </div>
  </div>

  <div class="grid-3" [@projectsReveal]="sectionState()">
    <article
      class="project"
      *ngFor="let p of projects; let i = index"
      [@cardHover]="hoveredIndex() === i ? 'hovered' : 'idle'"
      (mouseenter)="hoveredIndex.set(i)"
      (mouseleave)="hoveredIndex.set(-1)">

      <!-- Animated top accent bar -->
      <div
        class="project-accent-bar"
        [style.background]="'linear-gradient(90deg,' + p.badgeColor + ', transparent)'"
        [class.bar-active]="hoveredIndex() === i">
      </div>

      <div class="top">
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <span class="badge" *ngFor="let b of p.badges">{{ b }}</span>
        </div>
      </div>

      <h3>{{ p.title }}</h3>
      <p>{{ p.description }}</p>

      <ul class="project-highlights">
        <li *ngFor="let h of p.highlights">{{ h }}</li>
      </ul>

      <div class="tag-row">
        <span
          class="tag"
          *ngFor="let t of p.tags; let ti = index"
          [style.transition-delay]="hoveredIndex() === i ? (ti * 0.04) + 's' : '0s'"
          [class.tag-lit]="hoveredIndex() === i">
          {{ t }}
        </span>
      </div>

      <div class="actions">
        <a class="link" [href]="p.link" (click)="p.link === '#' && $event.preventDefault()">
          View Details &#8599;
        </a>
      </div>
    </article>
  </div>
</section>
