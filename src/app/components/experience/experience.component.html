<section id="experience">
  <div class="section-head">
    <div>
      <h2>Experience</h2>
      <p>Professional work experience.</p>
    </div>
  </div>

  <div class="card" style="padding: 18px;">
    <div class="timeline">
      <div class="step" *ngFor="let exp of experiences">
        <div class="dot" aria-hidden="true"></div>
        <div>
          <h4>{{ exp.role }}</h4>
          <div class="meta">{{ exp.duration }} • {{ exp.technologies }}</div>
          <p>{{ exp.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
